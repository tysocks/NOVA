<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NOVA</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Segoe UI", Arial, sans-serif; background: #0b1220; color: #e2e8f0; height: 100vh; overflow: hidden; }
    .ribbon { display: flex; gap: 8px; align-items: center; padding: 8px 10px; border-bottom: 1px solid #1f2937; background: #0f172a; }
    .app { display: flex; height: calc(100vh - 46px); width: 100vw; }
    .sidebar { width: 30%; min-width: 360px; max-width: 580px; background: #0f172a; border-right: 1px solid #1f2937; padding: 10px; overflow-y: auto; }
    .main { width: 70%; padding: 10px; background: #020617; overflow: hidden; display: flex; flex-direction: column; }
    .panel { background: #111827; border: 1px solid #1f2937; border-radius: 8px; padding: 10px; margin-bottom: 10px; }
    .panelHeader { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .panelHeader h3 { margin: 0; font-size: 0.92rem; color: #cbd5e1; }
    .addBtn, .collapseBtn { width: 26px; height: 26px; border-radius: 999px; border: 1px solid #334155; background: #0b1220; color: #e2e8f0; padding: 0; font-weight: 700; cursor: pointer; }
    .headerBtns { display: flex; gap: 6px; }
    .list { border: 1px solid #334155; border-radius: 6px; background: #0b1220; overflow-y: auto; max-height: 170px; }
    .item { padding: 7px 8px; border-bottom: 1px solid #1f2937; cursor: pointer; }
    .item:last-child { border-bottom: none; }
    .item.active { background: #1e293b; }
    .item.focused { outline: 1px solid #60a5fa; }
    .itemPrimary { font-size: 0.84rem; color: #e2e8f0; line-height: 1.2; }
    .itemMeta { font-size: 0.72rem; color: #94a3b8; margin-top: 2px; line-height: 1.2; }
    .empty { padding: 8px; color: #64748b; font-size: 0.78rem; }
    label { display: block; margin: 8px 0 4px 0; font-size: 0.78rem; color: #cbd5e1; }
    input, select, button { width: 100%; border: 1px solid #334155; border-radius: 6px; background: #0b1220; color: #e2e8f0; padding: 7px; }
    button { cursor: pointer; background: #1d4ed8; border-color: #1d4ed8; font-weight: 600; }
    .mainTabs { display: flex; gap: 6px; margin-bottom: 8px; }
    .tabBtn { width: auto; min-width: 120px; background: #0b1220; border-color: #334155; }
    .tabBtn.active { background: #1d4ed8; border-color: #1d4ed8; }
    .tabPanel { flex: 1; min-height: 0; display: none; }
    .tabPanel.active { display: block; }
    #plot { width: 100%; height: calc(100vh - 108px); }
    #metadataPanel { overflow: auto; border: 1px solid #1f2937; border-radius: 8px; background: #0b1220; padding: 8px; }
    #metadataEmpty { color: #94a3b8; font-size: 0.82rem; padding: 8px 4px; }
    #metadataTableWrap { display: none; overflow: auto; max-height: calc(100vh - 160px); }
    .status { color: #93c5fd; font-size: 0.85rem; margin-top: 8px; }
    .error { color: #fda4af; }
    .drawer { position: fixed; left: 0; right: 0; bottom: 0; background: #111827; border-top: 1px solid #334155; max-height: 44vh; padding: 10px; display: none; z-index: 40; }
    .drawer.show { display: block; }
    .tableWrap { overflow: auto; max-height: 34vh; }
    table { width: 100%; border-collapse: collapse; font-size: 0.78rem; }
    th, td { border-bottom: 1px solid #1f2937; padding: 5px; text-align: left; white-space: nowrap; }
    .modalBackdrop { position: fixed; inset: 0; background: rgba(2,6,23,0.7); display: none; z-index: 60; align-items: center; justify-content: center; }
    .modalBackdrop.show { display: flex; }
    .modal { width: min(760px, 92vw); max-height: 82vh; overflow: auto; background: #111827; border: 1px solid #334155; border-radius: 10px; padding: 12px; }
    .modalHeader { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .modalTitle { margin: 0; font-size: 0.95rem; color: #e2e8f0; }
    .modalClose { width: auto; min-width: 28px; padding: 4px 8px; }
    .modalGrid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .modalActions { margin-top: 12px; display: flex; gap: 8px; justify-content: flex-end; }
    .modalList { border: 1px solid #334155; border-radius: 6px; background: #0b1220; max-height: 48vh; overflow-y: auto; }
    .selectRow { padding: 8px; border-bottom: 1px solid #1f2937; cursor: pointer; }
    .selectRow:last-child { border-bottom: none; }
    .selectRow.active { background: #1e293b; }
    .contextMenu, .miniMenu { position: fixed; z-index: 80; display: none; background: #111827; border: 1px solid #334155; border-radius: 6px; min-width: 180px; }
    .contextItem, .miniMenuItem { padding: 8px; cursor: pointer; font-size: 0.82rem; border-bottom: 1px solid #1f2937; }
    .contextItem:last-child, .miniMenuItem:last-child { border-bottom: none; }
    .contextItem:hover, .miniMenuItem:hover { background: #1e293b; }
  </style>
</head>
<body>
  <div class="ribbon">
    <button id="showPreviewBtn" type="button" style="width:auto;min-width:150px;">Show Data Preview</button>
    <button id="sourceHelpBtn" type="button" style="width:auto;min-width:170px;">Source Help</button>
  </div>
  <div class="app">
    <aside class="sidebar">
      <div class="panel">
        <div class="panelHeader"><h3>Sources</h3><div class="headerBtns"><button data-collapse="sourcesList" class="collapseBtn" type="button">-</button><button id="addSourceBtn" class="addBtn" type="button">+</button></div></div>
        <div id="sourcesList" class="list"></div>
      </div>
      <div class="panel">
        <div class="panelHeader"><h3>Databases</h3><div class="headerBtns"><button data-collapse="databasesList" class="collapseBtn" type="button">-</button><button id="addDatabaseBtn" class="addBtn" type="button">+</button></div></div>
        <div id="databasesList" class="list"></div>
      </div>
      <div class="panel">
        <div class="panelHeader"><h3>Tests</h3><div class="headerBtns"><button data-collapse="testsList" class="collapseBtn" type="button">-</button><button id="addTestBtn" class="addBtn" type="button">+</button></div></div>
        <div id="testsList" class="list"></div>
      </div>
      <div class="panel">
        <div class="panelHeader"><h3>Channels</h3><div class="headerBtns"><button data-collapse="channelsList" class="collapseBtn" type="button">-</button><button id="addChannelBtn" class="addBtn" type="button">+</button></div></div>
        <div id="channelsList" class="list"></div>
      </div>
      <div class="panel">
        <h3 style="margin:0 0 8px 0; font-size:0.9rem; color:#cbd5e1;">Region</h3>
        <label for="t0Mode">Time Reference</label><select id="t0Mode"><option value="raw">Raw Time</option><option value="first_sample">t0 = First Point (per test)</option></select>
        <label for="startTime">Start Time</label><input id="startTime" type="text" placeholder="2026-01-01T00:00:00Z" />
        <label for="endTime">End Time</label><input id="endTime" type="text" placeholder="2026-01-01T00:01:00Z" />
      </div>
      <div class="panel">
        <label for="xAxis">X Axis</label><select id="xAxis"><option value="time">time</option></select>
        <div style="margin-top:10px;"><button id="loadBtn">Chooch</button></div>
        <p id="status" class="status"></p>
      </div>
    </aside>
    <main class="main">
      <div class="mainTabs">
        <button id="plotTabBtn" class="tabBtn active" type="button">Plot</button>
        <button id="metadataTabBtn" class="tabBtn" type="button">Metadata</button>
      </div>
      <div id="plotPanel" class="tabPanel active"><div id="plot"></div></div>
      <div id="metadataPanel" class="tabPanel">
        <div id="metadataEmpty">No metadata loaded yet. Click Chooch with selected tests.</div>
        <div id="metadataTableWrap">
          <table>
            <thead><tr id="metadataHeadRow"></tr></thead>
            <tbody id="metadataRows"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <div id="previewDrawer" class="drawer">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;"><strong>Loaded Data Preview</strong><button id="hidePreviewBtn" type="button" style="width:auto;min-width:100px;">Hide</button></div>
    <div class="tableWrap"><table><thead><tr><th>test_run_id</th><th>test_run_code</th><th>channel_name</th><th>unit</th><th>time</th><th>value</th></tr></thead><tbody id="rows"></tbody></table></div>
  </div>
  <div id="modalBackdrop" class="modalBackdrop"><div class="modal"><div class="modalHeader"><h4 id="modalTitle" class="modalTitle"></h4><button id="modalCloseBtn" class="modalClose" type="button">X</button></div><div id="modalBody"></div></div></div>
  <div id="contextMenu" class="contextMenu"></div>
  <div id="sourceAddMenu" class="miniMenu"></div>
  <div id="channelAddMenu" class="miniMenu"></div>

  <script>
    const STORAGE_KEY = "nova.uiState.v6";
    const byId = (id) => document.getElementById(id);
    const toIso = (v) => (v ? new Date(v).toISOString() : "n/a");
    let latestRows = [], metadataRows = [], testsData = [], channelsData = [], previewVisible = false, focusedItem = null, lastHoverPoint = null;
    let rulerEnabled = false, rulerPoints = [];
    let selectedSourceIds = new Set(), selectedDatabaseIds = new Set(), selectedTestIds = new Set(), selectedChannelIds = new Set();
    let addedTestIds = new Set(), addedChannelIds = new Set();
    let channelUnitMap = new Map();
    let state = { sources: [], databases: [], calculatedChannels: [], freqOverrides: {}, collapsed: {} };
    function setStatus(text, isError = false) { const e = byId("status"); e.textContent = text; e.className = isError ? "status error" : "status"; }
    function sourceConnQuery(src) { if (!src || src.type !== "postgres") return ""; const p = new URLSearchParams(); p.append("db_host", src.host); p.append("db_port", String(src.port)); p.append("db_user", src.user); p.append("db_password", src.password); p.append("db_sslmode", src.sslmode || "disable"); return p.toString(); }
    async function getJson(url) { const r = await fetch(url); if (!r.ok) throw new Error(`Request failed ${r.status}`); return r.json(); }
    function activeSources() { return state.sources.filter((s) => selectedSourceIds.has(s.id)); }
    function setPreviewVisible(v) { previewVisible = v; byId("previewDrawer").className = v ? "drawer show" : "drawer"; byId("showPreviewBtn").textContent = v ? "Hide Data Preview" : "Show Data Preview"; }
    function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify({ ...state, selectedSourceIds:[...selectedSourceIds], selectedDatabaseIds:[...selectedDatabaseIds], selectedTestIds:[...selectedTestIds], selectedChannelIds:[...selectedChannelIds], addedTestIds:[...addedTestIds], addedChannelIds:[...addedChannelIds], xAxis:byId("xAxis").value, t0Mode:byId("t0Mode").value, startTime:byId("startTime").value, endTime:byId("endTime").value, previewVisible })); }
    function loadState() { try { const s = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}"); state = { sources:s.sources || [], databases:s.databases || [], calculatedChannels:s.calculatedChannels || [], freqOverrides:s.freqOverrides || {}, collapsed:s.collapsed || {} }; selectedSourceIds = new Set(s.selectedSourceIds || []); selectedDatabaseIds = new Set(s.selectedDatabaseIds || []); selectedTestIds = new Set(s.selectedTestIds || []); selectedChannelIds = new Set(s.selectedChannelIds || []); addedTestIds = new Set(s.addedTestIds || []); addedChannelIds = new Set(s.addedChannelIds || []); byId("xAxis").value = s.xAxis || "time"; byId("t0Mode").value = s.t0Mode || "raw"; byId("startTime").value = s.startTime || ""; byId("endTime").value = s.endTime || ""; previewVisible = Boolean(s.previewVisible); } catch {} }
    function openModal(title, bodyHtml, onSave) { byId("modalTitle").textContent = title; byId("modalBody").innerHTML = bodyHtml; byId("modalBackdrop").classList.add("show"); byId("modalCloseBtn").onclick = closeModal; const s = byId("modalSaveBtn"); if (s) s.onclick = async () => { const shouldClose = await onSave(); if (shouldClose !== false) closeModal(); }; const c = byId("modalCancelBtn"); if (c) c.onclick = closeModal; }
    function closeModal() { byId("modalBackdrop").classList.remove("show"); byId("modalBody").innerHTML = ""; }
    function hideMenus() { byId("contextMenu").style.display = "none"; byId("sourceAddMenu").style.display = "none"; byId("channelAddMenu").style.display = "none"; }
    function showContextMenu(x,y,items){ const m=byId("contextMenu"); m.innerHTML=items.map((i,idx)=>`<div class="contextItem" data-i="${idx}">${i.label}</div>`).join(""); m.style.left=`${x}px`; m.style.top=`${y}px`; m.style.display="block"; m.querySelectorAll(".contextItem").forEach((el)=>el.onclick=()=>{items[Number(el.getAttribute("data-i"))].action(); hideMenus();}); }
    function showSourceAddMenu(x,y){ const m=byId("sourceAddMenu"); m.innerHTML=`<div class="miniMenuItem" data-t="postgres">Add PostgreSQL</div><div class="miniMenuItem" data-t="csv">Add CSV</div><div class="miniMenuItem" data-t="tdms">Add TDMS</div>`; m.style.left=`${x}px`; m.style.top=`${y}px`; m.style.display="block"; m.querySelectorAll(".miniMenuItem").forEach((el)=>el.onclick=()=>{const t=el.getAttribute("data-t"); hideMenus(); if(t==="postgres")showAddPostgresModal(); if(t==="csv")showAddCsvModal(); if(t==="tdms")showAddTdmsModal();}); }
    function showChannelAddMenu(x,y){ const m=byId("channelAddMenu"); m.innerHTML=`<div class="miniMenuItem" data-t="source">Add channels from source</div><div class="miniMenuItem" data-t="rolling">Rolling channel calculations</div><div class="miniMenuItem" data-t="formula">Channel wise calculations</div>`; m.style.left=`${x}px`; m.style.top=`${y}px`; m.style.display="block"; m.querySelectorAll(".miniMenuItem").forEach((el)=>el.onclick=()=>{const t=el.getAttribute("data-t"); hideMenus(); if(t==="source")showAddChannelsModal(); if(t==="rolling")showAddRollingChannelModal(); if(t==="formula")showAddChannelWiseModal();}); }
    document.addEventListener("click", (e) => {
      const menu = byId("sourceAddMenu");
      const addBtn = byId("addSourceBtn");
      const channelMenu = byId("channelAddMenu");
      const addChannelBtn = byId("addChannelBtn");
      if (menu.contains(e.target) || addBtn.contains(e.target) || channelMenu.contains(e.target) || addChannelBtn.contains(e.target)) return;
      hideMenus();
    });
    function setMainTab(name){ const isMetadata=name==="metadata"; byId("plotTabBtn").classList.toggle("active", !isMetadata); byId("metadataTabBtn").classList.toggle("active", isMetadata); byId("plotPanel").classList.toggle("active", !isMetadata); byId("metadataPanel").classList.toggle("active", isMetadata); if(!isMetadata && latestRows.length){ Plotly.Plots.resize(byId("plot")); } }
    function renderRows(rows){ const b=byId("rows"); b.innerHTML=""; rows.slice(0,200).forEach((r)=>{ const tr=document.createElement("tr"); tr.innerHTML=`<td>${r.test_run_id}</td><td>${r.test_run_code}</td><td>${r.channel_name}</td><td>${r.unit||"unitless"}</td><td>${r.time}</td><td>${Number(r.value).toFixed(4)}</td>`; b.appendChild(tr);}); }
    function renderMetadata(rows){ metadataRows=rows||[]; const empty=byId("metadataEmpty"); const wrap=byId("metadataTableWrap"); const head=byId("metadataHeadRow"); const body=byId("metadataRows"); if(!metadataRows.length){ empty.textContent="No metadata available for current selection."; empty.style.display="block"; wrap.style.display="none"; head.innerHTML=""; body.innerHTML=""; return; } const cols=Object.keys(metadataRows[0]); head.innerHTML=cols.map((c)=>`<th>${c}</th>`).join(""); body.innerHTML=""; metadataRows.forEach((r)=>{ const tr=document.createElement("tr"); tr.innerHTML=cols.map((c)=>`<td>${r[c] ?? ""}</td>`).join(""); body.appendChild(tr); }); empty.style.display="none"; wrap.style.display="block"; }
    function renderList(target,items,set,kind,empty){ const root=byId(target); root.innerHTML=""; if(!items.length){ root.innerHTML=`<div class="empty">${empty}</div>`; return;} items.forEach((it)=>{ const row=document.createElement("div"); row.className="item"+(set.has(it.id)?" active":"")+(focusedItem&&focusedItem.kind===kind&&focusedItem.id===it.id?" focused":""); row.innerHTML=`<div class="itemPrimary">${it.primary}</div>${it.meta?`<div class="itemMeta">${it.meta}</div>`:""}`; row.onclick=async()=>{focusedItem={kind,id:it.id}; if(set.has(it.id)) set.delete(it.id); else set.add(it.id); if(kind==="source"){ state.databases=state.databases.filter((d)=>selectedSourceIds.has(d.sourceId)); [...selectedDatabaseIds].forEach((id)=>{ if(!state.databases.some((d)=>d.id===id)) selectedDatabaseIds.delete(id);}); testsData=[]; channelsData=[]; } if(kind==="database"){ await refreshCatalogsForSelections(); } renderAll(); saveState();}; row.oncontextmenu=(e)=>{e.preventDefault(); focusedItem={kind,id:it.id}; const menu=[{label:"Delete",action:deleteFocused}]; if(kind==="channel"){ if(it.isCalculated) menu.push({label:"Edit calculated channel...",action:()=>editCalculatedChannel(it.id)}); menu.push({label:"Set Frequency...",action:()=>setChannelFrequency(it.id)}); } showContextMenu(e.clientX,e.clientY,menu);}; root.appendChild(row);}); }
    function buildXAxis(){ const x=byId("xAxis"),prev=x.value; x.innerHTML=`<option value="time">time</option>`; [...selectedChannelIds].forEach((id)=>{ const o=document.createElement("option"); o.value=id; o.textContent=id.split("|")[1]; x.appendChild(o);}); if([...x.options].some((o)=>o.value===prev)) x.value=prev; }
    function buildUnitAxes(traces){ const m=new Map(),layout={},axisStepPx=58; let i=0; traces.forEach((t)=>{ const u=t._unit||"unitless"; if(!m.has(u)){ i+=1; m.set(u,i===1?"y":`y${i}`); const key=i===1?"yaxis":`yaxis${i}`; layout[key]={title:u,overlaying:i===1?undefined:"y",side:"right",anchor:"free",position:1,autoshift:false,shift:(i-1)*axisStepPx,showticklabels:true,ticks:"outside",ticklen:4,automargin:true}; }}); traces.forEach((t)=>{ t.yaxis=m.get(t._unit||"unitless"); delete t._unit;}); return layout; }
    function applyFreq(points,chId){ const hz=Number(state.freqOverrides[chId]||0); if(!hz||hz<=0) return points; const bucket=Math.max(1,Math.round(1000/hz)); const bins=new Map(); points.forEach((p)=>{ const ts=new Date(p.time).getTime(),k=Math.floor(ts/bucket)*bucket; if(!bins.has(k)) bins.set(k,{sum:0,n:0,s:p}); const b=bins.get(k); b.sum+=p.value; b.n+=1;}); return [...bins.entries()].sort((a,b)=>a[0]-b[0]).map(([k,v])=>({...v.s,time:new Date(k).toISOString(),value:v.sum/v.n})); }
    function rulerOverlays(){ if(!rulerPoints.length) return {shapes:[],annotations:[]}; const shapes=[],annotations=[]; rulerPoints.forEach((p)=>{ shapes.push({type:"line",xref:"x",yref:p.yaxis,x0:p.x,x1:p.x,y0:-1e12,y1:1e12,line:{color:"#f59e0b",dash:"dot"}}); annotations.push({xref:"x",yref:p.yaxis,x:p.x,y:p.y,text:`${p.y.toFixed(4)}`,showarrow:true,arrowhead:2,bgcolor:"rgba(15,23,42,0.8)"});}); if(rulerPoints.length>=2){ const a=rulerPoints[rulerPoints.length-2],b=rulerPoints[rulerPoints.length-1]; const dx=(typeof a.x==="number"&&typeof b.x==="number")?(b.x-a.x):(new Date(b.x).getTime()-new Date(a.x).getTime())/1000; const dy=b.y-a.y; const slope=dx!==0?dy/dx:0; shapes.push({type:"line",xref:"x",yref:b.yaxis,x0:a.x,y0:a.y,x1:b.x,y1:b.y,line:{color:"#f97316",width:2}}); annotations.push({xref:"x",yref:b.yaxis,x:b.x,y:b.y,text:`Δx=${dx.toFixed(4)} Δy=${dy.toFixed(4)} slope=${slope.toFixed(4)}`,showarrow:true,arrowhead:2,bgcolor:"rgba(15,23,42,0.8)"});} return {shapes,annotations}; }
    function plotRows(rows){ const xAxis=byId("xAxis").value,t0Mode=byId("t0Mode").value; const grouped=new Map(); rows.forEach((r)=>{const cid=`${r.__dbId}|${r.channel_name}`;const k=`${r.test_run_code} | ${cid}`;if(!grouped.has(k))grouped.set(k,[]);grouped.get(k).push(r);}); const t0=new Map(); if(t0Mode==="first_sample") rows.forEach((r)=>{const k=`${r.__dbId}|${r.test_run_code}`;const ts=new Date(r.time).getTime();if(!t0.has(k)||ts<t0.get(k))t0.set(k,ts);}); const traces=[]; if(xAxis==="time"){ grouped.forEach((pts,name)=>{ const chId=`${pts[0].__dbId}|${pts[0].channel_name}`; const down=applyFreq(pts,chId).sort((a,b)=>new Date(a.time)-new Date(b.time)); traces.push({type:"scattergl",mode:"lines",name,x:down.map((p)=>t0Mode==="first_sample"?(new Date(p.time).getTime()-t0.get(`${p.__dbId}|${p.test_run_code}`))/1000:p.time),y:down.map((p)=>p.value),_unit:pts[0]?.unit||channelUnitMap.get(chId)||"unitless"});}); } else { const byTest=new Map(); rows.forEach((r)=>{const tk=`${r.__dbId}|${r.test_run_code}`;if(!byTest.has(tk))byTest.set(tk,new Map());const m=byTest.get(tk);if(!m.has(r.time))m.set(r.time,{});m.get(r.time)[`${r.__dbId}|${r.channel_name}`]=r.value;}); byTest.forEach((timeMap,tk)=>{ [...selectedChannelIds].filter((c)=>c!==xAxis).forEach((chId)=>{const xs=[],ys=[];timeMap.forEach((v)=>{if(v[xAxis]!==undefined&&v[chId]!==undefined){xs.push(v[xAxis]);ys.push(v[chId]);}}); if(xs.length) traces.push({type:"scattergl",mode:"markers",name:`${tk} | ${chId.split("|")[1]} vs ${xAxis.split("|")[1]}`,x:xs,y:ys,_unit:channelUnitMap.get(chId)||"unitless"});});}); }
      const yLayout=buildUnitAxes(traces), unitCount=Object.keys(yLayout).length, ruler=rulerOverlays();
      Plotly.newPlot("plot", traces, {paper_bgcolor:"#020617",plot_bgcolor:"#020617",font:{color:"#e2e8f0"},xaxis:{title:""},margin:{l:48,r:Math.max(90,90+(unitCount-1)*58),t:12,b:44},legend:{x:0.01,y:0.99,xanchor:"left",yanchor:"top",bgcolor:"rgba(2,6,23,0.55)"},shapes:ruler.shapes,annotations:ruler.annotations,...yLayout},{responsive:true,displaylogo:false,scrollZoom:true,editable:true,edits:{legendPosition:true,axisTitleText:false,titleText:false,annotationPosition:false,annotationText:false,shapePosition:false}});
      const plot=byId("plot");
      plot.on("plotly_hover",(ev)=>{ if(!ev?.points?.length) return; const p=ev.points[0]; lastHoverPoint={x:p.x,y:p.y,yaxis:p.yaxis||"y"}; });
      plot.oncontextmenu=(e)=>{ if(!rulerEnabled||!lastHoverPoint) return; e.preventDefault(); rulerPoints.push({...lastHoverPoint}); if(rulerPoints.length>2) rulerPoints=rulerPoints.slice(-2); plotRows(rows); };
    }

    async function showAddDatabaseModal(){ const srcs=activeSources(); if(!srcs.length){ setStatus("Select at least one source first.",true); return; } const rows=[]; for(const src of srcs){ if(src.type==="postgres"){ try{ const dbs=await getJson(`/api/databases?${sourceConnQuery(src)}`); dbs.forEach((d)=>rows.push({id:`${src.id}|${d.name}`,primary:d.name,meta:src.name,sourceId:src.id,sourceType:src.type,name:d.name})); }catch{} } else rows.push({id:`${src.id}|${src.file_path||src.name}`,primary:src.name,meta:`${src.type} source`,sourceId:src.id,sourceType:src.type,name:src.name}); } const chosen=new Set(); openModal("Add Databases",`${searchableRowsHtml("dbm",rows,chosen)}<div class="modalActions"><button id="modalCancelBtn" type="button">Cancel</button><button id="modalSaveBtn" type="button">Add Selected</button></div>`,async()=>{ [...chosen].forEach((id)=>{ const r=rows.find((x)=>x.id===id); if(!r) return; const entry={id:crypto.randomUUID(),sourceId:r.sourceId,sourceType:r.sourceType,name:r.name}; if(!state.databases.some((d)=>d.sourceId===entry.sourceId&&d.name===entry.name)) state.databases.push(entry); }); [...selectedDatabaseIds].forEach((id)=>{ if(!state.databases.some((d)=>d.id===id)) selectedDatabaseIds.delete(id); }); state.databases.forEach((d)=>{ if(chosen.has(`${d.sourceId}|${d.name}`)) selectedDatabaseIds.add(d.id); }); await refreshCatalogsForSelections(); renderAll(); saveState(); }); bindSearchableModal("dbm",chosen); }
    async function showAddTestsModal(){ if(!selectedDatabaseIds.size){ setStatus("Select at least one database first.",true); return; } await refreshCatalogsForSelections(); const dup={}; testsData.forEach((t)=>dup[`${t.__dbId}|${t.run_code}`]=(dup[`${t.__dbId}|${t.run_code}`]||0)+1); const rows=testsData.map((t)=>({id:`${t.__dbId}|${t.test_run_id}`,primary:dup[`${t.__dbId}|${t.run_code}`]>1?`${t.run_code} (#${t.test_run_id})`:t.run_code,meta:`${toIso(t.start_time)} -> ${toIso(t.end_time)} | t0: ${toIso(t.t0_utc)}`})); const chosen=new Set(addedTestIds); openModal("Select Tests",`${searchableRowsHtml("tm",rows,chosen)}<div class="modalActions"><button id="modalCancelBtn" type="button">Cancel</button><button id="modalSaveBtn" type="button">Apply</button></div>`,async()=>{ addedTestIds=new Set(chosen); selectedTestIds=new Set(chosen); renderAll(); saveState(); }); bindSearchableModal("tm",chosen); }
    async function showAddChannelsModal(){ if(!addedTestIds.size){ setStatus("Add at least one test first.",true); return; } await refreshCatalogsForSelections(); const rows=[]; const testsByDb=new Map(); [...addedTestIds].forEach((k)=>{ const [dbId,testId]=k.split("|"); if(!testsByDb.has(dbId)) testsByDb.set(dbId,[]); testsByDb.get(dbId).push(testId); }); for(const [dbId,testIds] of testsByDb.entries()){ const db=state.databases.find((d)=>d.id===dbId),src=db?state.sources.find((s)=>s.id===db.sourceId):null; if(!db||!src) continue; if(src.type==="postgres"){ const p=new URLSearchParams(); testIds.forEach((id)=>p.append("test_run_ids",id)); p.append("db_name",db.name); sourceConnQuery(src).split("&").forEach((kv)=>{ if(kv){ const [k,v]=kv.split("="); p.append(k,decodeURIComponent(v)); }}); try{ const ch=await getJson(`/api/available-channels?${p.toString()}`); ch.forEach((c)=>rows.push({id:`${dbId}|${c.channel_name}`,primary:c.channel_name,meta:`unit ${c.unit||"unitless"} | min ${c.valid_min??"n/a"} | max ${c.valid_max??"n/a"} | rate ${state.freqOverrides[`${dbId}|${c.channel_name}`]||c.sample_rate_hz||"n/a"}Hz`})); }catch{} } else { try{ const ch=await getJson(`/api/file/channels?source_type=${encodeURIComponent(src.type)}&file_path=${encodeURIComponent(src.file_path||"")}`); ch.forEach((c)=>rows.push({id:`${dbId}|${c.channel_name}`,primary:c.channel_name,meta:`unit ${c.unit||"unitless"} | min ${c.valid_min??"n/a"} | max ${c.valid_max??"n/a"} | rate ${state.freqOverrides[`${dbId}|${c.channel_name}`]||c.sample_rate_hz||"n/a"}Hz`})); }catch{} } } const dedup=new Map(); rows.forEach((r)=>dedup.set(r.id,r)); const finalRows=[...dedup.values()]; const chosen=new Set(addedChannelIds); openModal("Select Channels",`${searchableRowsHtml("cm",finalRows,chosen)}<div class="modalActions"><button id="modalCancelBtn" type="button">Cancel</button><button id="modalSaveBtn" type="button">Apply</button></div>`,async()=>{ addedChannelIds=new Set(chosen); selectedChannelIds=new Set(chosen); renderAll(); saveState(); }); bindSearchableModal("cm",chosen); }
    function rollingCalc(op, arr){ if(!arr.length) return null; if(op==="mean") return arr.reduce((a,b)=>a+b,0)/arr.length; if(op==="sum") return arr.reduce((a,b)=>a+b,0); if(op==="min") return Math.min(...arr); if(op==="max") return Math.max(...arr); if(op==="std"){ const m=arr.reduce((a,b)=>a+b,0)/arr.length; const v=arr.reduce((a,b)=>a+((b-m)*(b-m)),0)/arr.length; return Math.sqrt(v); } return null; }
    function computeCalculatedRows(baseRows){ const out=[]; const selectedCalcs=(state.calculatedChannels||[]).filter((c)=>selectedChannelIds.has(`${c.dbId}|${c.name}`)); for(const calc of selectedCalcs){ const dbRows=baseRows.filter((r)=>r.__dbId===calc.dbId); if(calc.kind==="rolling"){ const srcName=(calc.channels&&calc.channels[0])?calc.channels[0].split("|")[1]:""; const srcRows=dbRows.filter((r)=>r.channel_name===srcName); const byTest=new Map(); srcRows.forEach((r)=>{ const k=`${r.test_run_id}|${r.test_run_code}`; if(!byTest.has(k)) byTest.set(k,[]); byTest.get(k).push(r); }); byTest.forEach((rows)=>{ rows.sort((a,b)=>new Date(a.time)-new Date(b.time)); const w=Math.max(1, Number(calc.window||1)); for(let i=0;i<rows.length;i++){ const vals=rows.slice(Math.max(0,i-w+1),i+1).map((x)=>Number(x.value)).filter((x)=>Number.isFinite(x)); const v=rollingCalc(calc.op, vals); if(v===null||!Number.isFinite(v)) continue; out.push({ test_run_id: rows[i].test_run_id, test_run_code: rows[i].test_run_code, channel_name: calc.name, unit: calc.unit || null, time: rows[i].time, value: Number(v), __dbId: calc.dbId }); } }); continue; } if(calc.kind==="formula"){ const deps=(calc.channels||[]).map((id)=>id.split("|")[1]); if(!deps.length) continue; const compiled=compileFormula(calc.formula||"", deps.length); if(!compiled.ok) continue; const byTest=new Map(); dbRows.forEach((r)=>{ const k=`${r.test_run_id}|${r.test_run_code}`; if(!byTest.has(k)) byTest.set(k,[]); byTest.get(k).push(r); }); byTest.forEach((rows)=>{ const byTime=new Map(); rows.forEach((r)=>{ const t=String(r.time); if(!byTime.has(t)) byTime.set(t,{}); byTime.get(t)[r.channel_name]=Number(r.value); }); const sortedTimes=[...byTime.keys()].sort((a,b)=>new Date(a)-new Date(b)); let prevMs=null; const ctx={dt_s:0,__bpStates:{}}; sortedTimes.forEach((t)=>{ const slot=byTime.get(t); const vals=deps.map((nm)=>slot[nm]); if(vals.some((v)=>!Number.isFinite(v))) return; const currMs=new Date(t).getTime(); ctx.dt_s=prevMs===null?0:Math.max(0,(currMs-prevMs)/1000); prevMs=currMs; let v=null; try{ v=compiled.evalFn(vals,ctx); }catch{ v=null; } if(v===null||!Number.isFinite(v)) return; const sample=rows.find((x)=>String(x.time)===t); out.push({ test_run_id: sample.test_run_id, test_run_code: sample.test_run_code, channel_name: calc.name, unit: calc.unit || null, time: t, value: Number(v), __dbId: calc.dbId }); }); }); } } return out; }
    async function loadMetadataForSelection(){
      const allMetadata = [];
      for(const dbId of selectedDatabaseIds){
        const db=state.databases.find((d)=>d.id===dbId),src=db?state.sources.find((s)=>s.id===db.sourceId):null;
        if(!db||!src||src.type!=="postgres") continue;
        const tests=[...selectedTestIds].filter((t)=>t.startsWith(`${dbId}|`)).map((t)=>t.split("|")[1]);
        if(!tests.length) continue;
        const p=new URLSearchParams();
        tests.forEach((id)=>p.append("test_run_ids",id));
        p.append("db_name",db.name);
        sourceConnQuery(src).split("&").forEach((kv)=>{ if(kv){ const [k,v]=kv.split("="); p.append(k,decodeURIComponent(v)); }});
        try{
          const rows=await getJson(`/api/metadata?${p.toString()}`);
          rows.forEach((r)=>allMetadata.push({...r,__dbId:dbId,__database:db.name}));
        }catch{
          // Metadata is optional; keep main plotting flow alive.
        }
      }
      renderMetadata(allMetadata);
    }
    async function loadTimeseries(){
      if(!selectedDatabaseIds.size||!selectedTestIds.size||!selectedChannelIds.size){ setStatus("Select sources, databases, tests, and channels first.",true); return; }
      const rowsAll=[];
      for(const dbId of selectedDatabaseIds){
        const db=state.databases.find((d)=>d.id===dbId),src=db?state.sources.find((s)=>s.id===db.sourceId):null;
        if(!db||!src) continue;
        const tests=[...selectedTestIds].filter((t)=>t.startsWith(`${dbId}|`)).map((t)=>t.split("|")[1]);
        const selectedForDb=[...selectedChannelIds].filter((c)=>c.startsWith(`${dbId}|`)).map((c)=>c.split("|")[1]);
        const calcForDb=(state.calculatedChannels||[]).filter((c)=>c.dbId===dbId&&selectedForDb.includes(c.name));
        const channelsSet=new Set(selectedForDb.filter((c)=>!calcForDb.some((x)=>x.name===c)));
        calcForDb.forEach((c)=> (c.channels||[]).forEach((id)=>channelsSet.add(id.split("|")[1])));
        const channels=[...channelsSet];
        if(!tests.length||!channels.length) continue;
        if(src.type==="postgres"){
          const p=new URLSearchParams();
          tests.forEach((id)=>p.append("test_run_ids",id));
          channels.forEach((ch)=>p.append("channel_names",ch));
          p.append("limit","5000000");
          p.append("db_name",db.name);
          sourceConnQuery(src).split("&").forEach((kv)=>{ if(kv){ const [k,v]=kv.split("="); p.append(k,decodeURIComponent(v)); }});
          const s=byId("startTime").value.trim(),e=byId("endTime").value.trim();
          if(s) p.append("start_time",s);
          if(e) p.append("end_time",e);
          const rows=await getJson(`/api/timeseries?${p.toString()}`);
          rows.forEach((r)=>rowsAll.push({...r,__dbId:dbId}));
        } else {
          const p=new URLSearchParams();
          p.append("source_type",src.type);
          p.append("file_path",src.file_path||"");
          p.append("limit","5000000");
          channels.forEach((ch)=>p.append("channel_names",ch));
          const rows=await getJson(`/api/file/timeseries?${p.toString()}`);
          rows.forEach((r)=>rowsAll.push({...r,__dbId:dbId}));
        }
      }
      const calcRows=computeCalculatedRows(rowsAll);
      const selectedNonCalc=rowsAll.filter((r)=>selectedChannelIds.has(`${r.__dbId}|${r.channel_name}`));
      const finalRows=[...selectedNonCalc,...calcRows];
      latestRows=finalRows;
      renderRows(finalRows);
      plotRows(finalRows);
      await loadMetadataForSelection();
      saveState();
      setStatus(`Loaded ${finalRows.length} rows.`);
    }
    async function initialize(){ loadState(); await refreshCatalogsForSelections(); renderAll(); setStatus("Ready."); document.querySelectorAll(".collapseBtn").forEach((btn)=>{ const listId=btn.getAttribute("data-collapse"); btn.onclick=()=>{ const key=listId.replace("List",""); state.collapsed[key]=!state.collapsed[key]; const el=byId(listId); el.style.display=state.collapsed[key]?"none":"block"; btn.textContent=state.collapsed[key]?"+":"-"; saveState(); }; if(state.collapsed[listId.replace("List","")]) btn.click(); }); }
    byId("showPreviewBtn").onclick=()=>{ setPreviewVisible(!previewVisible); saveState(); };
    byId("hidePreviewBtn").onclick=()=>{ setPreviewVisible(false); saveState(); };
    byId("sourceHelpBtn").onclick=()=>setStatus("Use + to add items. Click rows to multi-select. Right-click rows for delete/frequency. Press R to toggle ruler.");
    byId("addSourceBtn").addEventListener("mousedown", (e) => {
      e.preventDefault();
      e.stopPropagation();
      if (e.stopImmediatePropagation) e.stopImmediatePropagation();
    });
    byId("addSourceBtn").onclick=(e)=>showAddSourceMenu(e);
    byId("addDatabaseBtn").onclick=showAddDatabaseModal;
    byId("addTestBtn").onclick=showAddTestsModal;
    byId("addChannelBtn").addEventListener("mousedown", (e) => {
      e.preventDefault();
      e.stopPropagation();
      if (e.stopImmediatePropagation) e.stopImmediatePropagation();
    });
    byId("addChannelBtn").onclick=showAddChannelsMenu;
    byId("plotTabBtn").onclick=()=>setMainTab("plot");
    byId("metadataTabBtn").onclick=()=>setMainTab("metadata");
    byId("xAxis").onchange=()=>{ if(latestRows.length) plotRows(latestRows); saveState(); };
    byId("t0Mode").onchange=()=>{ if(latestRows.length) plotRows(latestRows); saveState(); };
    byId("startTime").onchange=saveState; byId("endTime").onchange=saveState;
    byId("loadBtn").onclick=loadTimeseries;
    document.addEventListener("keydown",(e)=>{ if(e.key==="Delete"){ e.preventDefault(); deleteFocused(); } if(e.key.toLowerCase()==="r"){ rulerEnabled=!rulerEnabled; setStatus(`Ruler ${rulerEnabled?"enabled":"disabled"}; right-click plot after hover to place points.`);} });
    requestAnimationFrame(()=>setTimeout(initialize,0));
